<!DOCTYPE html>
<html>
    <head>
        <title>assignment</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            @font-face {
                        font-family: 'Independent';
                        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.1/Dokrip.woff') format('woff');
                        font-weight: normal;
                        font-display: swap;
                    }
            body {
                font-family: "Independent";

                margin: 0;
                height: 100vh;

                display: flex;
                flex-direction: column;

                justify-content: center;
                align-items: center;

                text-align: center;

            }

        p {
            font-size: 1.5rem;
        }

        .line{
            opacity: 0;

            animation: fade 1s forwards;
            animation-delay:calc(var(--i) * 1.2s);
        }

        .last{
            width: 100%;
            text-align: right;
            padding-right: 50px;
        }

        @keyframes fade {

            to{
                opacity: 1;
            }
        }
        </style>

    </head>


    <body>
        <h1>서시</h1>
        <p class="line" style="--i:0";>죽는 날까지 하늘을 우러러</p>
        <p class="line" style="--i:1";>한 점 부끄럼이 없기를,</p>
        <p class="line" style="--i:2";>잎새에 이는 바람에도</p>
        <p class="line" style="--i:3";>나는 괴로워했다.</p>
        <p class="line" style="--i:4";>별을 노래하는 마음으로</p>
        <p class="line" style="--i:5";>모든 죽어가는 것을 사랑해야지</p>
        <p class="line" style="--i:6";>그리고 나에게 주어진 길을</p>
        <p class="line" style="--i:7";>걸어가야겠다.</p>    

        <p class="line" style="--i:8";>오늘 밤에도 별이 바람에 스치운다.</p>
        <p class="line last" style="--i:9";>윤동주</p>
    </body>
</html>
